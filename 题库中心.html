<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>蓝企鹅题库中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #e8eaf0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        /* 手机容器 */
        .phone-container {
            position: relative;
            width: 375px;
            height: 812px;
            background: #000;
            border-radius: 50px;
            padding: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .phone-frame {
            width: 100%;
            height: 100%;
            background: #fff;
            border-radius: 40px;
            overflow: hidden;
            position: relative;
        }

        /* 刘海 */
        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 180px;
            height: 30px;
            background: #000;
            border-radius: 0 0 20px 20px;
            z-index: 10;
        }

        /* 状态栏 */
        .status-bar {
            height: 44px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 24px 8px;
            font-size: 14px;
            font-weight: 600;
            z-index: 99;
        }

        /* 内容区 */
        .screen-content {
            height: calc(100% - 44px);
            overflow-y: auto;
            background-color: #f7f9fc;
        }

        .screen-content::-webkit-scrollbar { display: none; }

        /* 底部指示条 */
        .home-indicator {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 134px;
            height: 5px;
            background: #000;
            border-radius: 3px;
            opacity: 0.3;
        }

        /* 内容样式 */
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            padding: 25px 20px 25px;
            color: white;
        }

        .user-stat {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .score-badge {
            background: rgba(255,255,255,0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        .title-section h1 { font-size: 24px; margin-bottom: 5px; }
        .title-section p { font-size: 13px; opacity: 0.8; }

        /* 搜索框 */
        .search-bar {
            background: rgba(255,255,255,0.15);
            margin-top: 15px;
            padding: 10px 15px;
            border-radius: 12px;
            font-size: 13px;
            color: #eee;
        }

        /* 题库列表 */
        .content-area { padding: 20px; }
        .section-h { font-size: 16px; font-weight: bold; margin-bottom: 15px; display: flex; justify-content: space-between; }
        .section-h small { color: #1e3c72; font-size: 12px; }

        .topic-card {
            background: white;
            border-radius: 18px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border: 1px solid #eee;
        }

        .topic-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .topic-info { flex: 1; }
        .topic-info h3 { font-size: 15px; margin-bottom: 4px; color: #333; }
        .topic-info p { font-size: 12px; color: #999; }

        .progress-mini {
            width: 60px;
            text-align: right;
        }

        .perc { font-size: 14px; font-weight: bold; color: #1e3c72; display: block; }
        .p-bar-bg { width: 100%; height: 4px; background: #eee; border-radius: 2px; margin-top: 5px; }
        .p-bar-fill { height: 100%; background: #FFD700; border-radius: 2px; }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="phone-frame">
        <!-- 刘海 -->
        <div class="notch"></div>
        
        <!-- 状态栏 -->
        <div class="status-bar">
            <span id="time">09:41</span>
            <div style="display: flex; gap: 5px; align-items: center;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12.01 21.49L23.64 7c-.45-.34-4.93-4-11.64-4C5.28 3 .81 6.66.36 7l11.63 14.49.01.01.01-.01z" fill-opacity=".3"/></svg>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
            </div>
        </div>

        <div class="screen-content">
            <div class="header">
                <div class="user-stat">
                    <span class="score-badge">我的积分: 1280</span>
                    <span style="font-size: 18px;">🔔</span>
                </div>
                <div class="title-section">
                    <h1>技能题库中心</h1>
                    <p>今天已练 15 题，超过了全国 88% 的同行</p>
                </div>
                <div class="search-bar">🔍 搜索考核科目或关键词</div>
            </div>

            <div class="content-area">
            <div class="section-h">
                最近必考
                <small>全部科目 ></small>
            </div>

            <div class="topic-card">
                <div class="topic-icon" style="background: #FFF4E5;">🍼</div>
                <div class="topic-info">
                    <h3>新生儿护理专项</h3>
                    <p>共 120 题 | 难度: 中等</p>
                </div>
                <div class="progress-mini">
                    <span class="perc">80%</span>
                    <div class="p-bar-bg"><div class="p-bar-fill" style="width: 80%"></div></div>
                </div>
            </div>

            <div class="topic-card">
                <div class="topic-icon" style="background: #E5F7FF;">🥘</div>
                <div class="topic-info">
                    <h3>营养膳食搭配</h3>
                    <p>共 85 题 | 难度: 简单</p>
                </div>
                <div class="progress-mini">
                    <span class="perc">35%</span>
                    <div class="p-bar-bg"><div class="p-bar-fill" style="width: 35%"></div></div>
                </div>
            </div>

            <div class="section-h" style="margin-top: 25px;">
                专项练习
            </div>

            <div class="topic-card">
                <div class="topic-icon" style="background: #F0F0FF;">🧼</div>
                <div class="topic-info">
                    <h3>保洁实操规范</h3>
                    <p>已通过考核 | 100分</p>
                </div>
                <div style="color: #4CAF50; font-size: 20px;">✓</div>
            </div>

            <div class="topic-card">
                <div class="topic-icon" style="background: #FFF0F0;">🚑</div>
                <div class="topic-info">
                    <h3>应急急救常识</h3>
                    <p>未开始练习 | 50 题</p>
                </div>
                <div class="progress-mini">
                    <span class="perc" style="color:#ccc">0%</span>
                    <div class="p-bar-bg"><div class="p-bar-fill" style="width: 0%"></div></div>
                </div>
            </div>
        </div>

        <!-- 底部Home指示条 -->
        <div class="home-indicator"></div>
    </div>
</div>

<script>
    function updateTime() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        document.getElementById('time').textContent = h + ':' + m;
    }
    setInterval(updateTime, 1000);
    updateTime();
</script>

</body>
</html>
