<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>蓝企鹅智能助教</title>
    <style>
        :root {
            --primary-color: #2D5AFE;
            --bg-light: #F8FAFF;
            --text-dark: #1D2129;
            --text-gray: #86909C;
            --white: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #e8eaf0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .phone-container {
            position: relative;
            width: 375px;
            height: 812px;
            background: #000;
            border-radius: 50px;
            padding: 12px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
        }

        .phone-frame {
            width: 100%;
            height: 100%;
            background: var(--bg-light);
            border-radius: 40px;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 160px;
            height: 30px;
            background: #000;
            border-radius: 0 0 18px 18px;
            z-index: 100;
        }

        .status-bar {
            height: 44px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 24px 8px;
            font-size: 14px;
            font-weight: 600;
            z-index: 99;
        }

        .home-indicator {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 5px;
            background: #000;
            border-radius: 10px;
            opacity: 0.1;
        }

        .chat-header {
            background: var(--white);
            padding: 15px 24px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.03);
        }

        .back-btn { 
            font-size: 24px; 
            color: var(--text-dark); 
            margin-right: 12px; 
            cursor: pointer;
        }

        .assistant-profile { display: flex; align-items: center; flex: 1; }
        .assistant-avatar-box {
            width: 44px; 
            height: 44px;
            border-radius: 14px; 
            overflow: hidden;
            box-shadow: 0 4px 12px rgba(45, 90, 254, 0.2);
            margin-right: 12px;
        }
        .assistant-avatar-box img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }

        .assistant-status h3 { font-size: 17px; color: var(--text-dark); font-weight: 600; }
        .assistant-status span { font-size: 11px; color: #00B42A; display: flex; align-items: center; gap: 4px; }
        .assistant-status span::before { content: ''; width: 6px; height: 6px; background: #00B42A; border-radius: 50%; }

        .chat-content {
            flex: 1;
            padding: 24px 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .msg { display: flex; max-width: 88%; position: relative; gap: 10px; }
        
        .msg-left { align-self: flex-start; }
        .msg-left .assistant-avatar {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            object-fit: cover;
            flex-shrink: 0;
        }
        .msg-left .bubble {
            background: var(--white);
            color: var(--text-dark);
            border-radius: 20px 20px 20px 4px;
            padding: 14px 18px;
            font-size: 15px;
            line-height: 1.6;
            box-shadow: 0 4px 16px rgba(0,0,0,0.04);
        }

        .msg-right { align-self: flex-end; flex-direction: row-reverse; gap: 10px; }
        .user-avatar { width: 38px; height: 38px; border-radius: 12px; object-fit: cover; flex-shrink: 0; }
        .msg-right .bubble {
            background: var(--primary-color);
            color: var(--white);
            border-radius: 20px 20px 4px 20px;
            padding: 14px 18px;
            font-size: 15px;
            line-height: 1.6;
            box-shadow: 0 8px 20px rgba(45, 90, 254, 0.15);
        }

        .recom-card {
            margin-top: 12px;
            background: #F2F6FF;
            border-radius: 16px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(45, 90, 254, 0.1);
            cursor: pointer;
        }
        .recom-icon {
            width: 40px;
            height: 40px;
            background: var(--white);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .recom-info b { font-size: 13px; color: var(--primary-color); display: block; }
        .recom-info p { font-size: 11px; color: var(--text-gray); margin-top: 2px; }

        .input-area {
            padding: 10px 20px 20px;
            background: var(--white);
        }
        .input-capsule {
            background: #F2F3F5;
            border-radius: 28px;
            padding: 6px 6px 6px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .input-capsule .icon-left {
            font-size: 20px;
            color: var(--text-gray);
        }
        .input-capsule input {
            flex: 1;
            border: none;
            background: transparent;
            height: 40px;
            font-size: 14px;
            outline: none;
            color: var(--text-dark);
        }
        .input-capsule input::placeholder {
            color: var(--text-gray);
        }
        .send-icon-btn {
            width: 40px;
            height: 40px;
            background: var(--primary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .send-icon-btn:active { transform: scale(0.9); }
        .send-icon-btn svg {
            width: 18px;
            height: 18px;
        }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="phone-frame">
        <div class="notch"></div>
        
        <div class="status-bar">
            <span id="time">09:41</span>
            <div style="display: flex; gap: 5px; align-items: center;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12.01 21.49L23.64 7c-.45-.34-4.93-4-11.64-4C5.28 3 .81 6.66.36 7l11.63 14.49.01.01.01-.01z" fill-opacity=".3"/></svg>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
            </div>
        </div>

        <div class="chat-header">
            <div class="back-btn" onclick="history.back()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </div>
            <div class="assistant-profile">
                <div class="assistant-avatar-box">
                    <img src="ai企鹅悬浮头像.png" alt="蓝企鹅助教">
                </div>
                <div class="assistant-status">
                    <h3>技能助教蓝蓝</h3>
                    <span>系统已连接</span>
                </div>
            </div>
            <div style="color: var(--text-gray); cursor: pointer;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/>
                </svg>
            </div>
        </div>

        <div class="chat-content">
            <div class="msg msg-left">
                <img src="ai企鹅悬浮头像.png" class="assistant-avatar" alt="助教">
                <div class="bubble">
                    王大姐，我看您正在复习"母婴护理"专题，有哪个知识点需要我详细讲解吗？
                </div>
            </div>

            <div class="msg msg-right">
                <img src="https://i.pravatar.cc/100?u=user1" class="user-avatar" alt="用户">
                <div class="bubble">
                    蓝蓝，新生儿吐奶后的处理步骤，我总怕记漏了，能整理个简单的顺口溜吗？
                </div>
            </div>

            <div class="msg msg-left">
                <img src="ai企鹅悬浮头像.png" class="assistant-avatar" alt="助教">
                <div class="bubble">
                    没问题！记准这四字：<strong>"侧、清、拍、观"</strong>。
                    <br><br>
                    1. <strong>侧</strong>：立刻侧卧防呛。
                    <br>2. <strong>清</strong>：清理口鼻残留。
                    <br>3. <strong>拍</strong>：稳定后轻拍背。
                    <br>4. <strong>观</strong>：观察精神状态。
                    
                    <div class="recom-card">
                        <div class="recom-icon">📚</div>
                        <div class="recom-info">
                            <b>专项错题解析</b>
                            <p>基于您的薄弱项精准推荐</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-capsule">
                <span class="icon-left">➕</span>
                <input type="text" placeholder="向助教提问...">
                <button class="send-icon-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>

        <div class="home-indicator"></div>
    </div>
</div>

<script>
    function updateTime() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        document.getElementById('time').textContent = h + ':' + m;
    }
    setInterval(updateTime, 1000);
    updateTime();
</script>

</body>
</html>
