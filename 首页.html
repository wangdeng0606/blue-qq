<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蓝企鹅家政培训平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #e8eaf0;
            font-family: -apple-system, "SF Pro Text", "PingFang SC", sans-serif;
        }

        /* 手机容器 */
        .phone-container {
            position: relative;
            width: 375px;
            height: 812px;
            background: #000;
            border-radius: 50px;
            padding: 12px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
        }

        .phone-frame {
            width: 100%;
            height: 100%;
            background: #F4F7FA;
            border-radius: 40px;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 160px;
            height: 30px;
            background: #000;
            border-radius: 0 0 18px 18px;
            z-index: 100;
        }

        /* 状态栏 */
        .status-bar {
            height: 44px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 24px 8px;
            font-size: 14px;
            font-weight: 600;
            z-index: 99;
        }

        /* 内容区 */
        .screen-content {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 100px;
        }

        .screen-content::-webkit-scrollbar { display: none; }

        /* 顶部标题栏 */
        .app-header {
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #F4F7FA;
        }
        .app-title { font-size: 22px; font-weight: 800; color: #1e3c72; letter-spacing: 0.5px; }

        /* 顶部Banner - 专业感升级 */
        .top-banner {
            margin: 10px 15px;
            height: 160px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            color: white;
            padding: 20px;
            box-shadow: 0 10px 20px rgba(30, 60, 114, 0.2);
        }

        .banner-content h2 { font-size: 24px; margin-bottom: 10px; font-weight: 600; }
        .banner-content p { font-size: 15px; opacity: 0.9; line-height: 1.6; }
        .banner-tag {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 12px;
            border-radius: 10px;
            font-size: 12px;
            margin-bottom: 10px;
            backdrop-filter: blur(5px);
        }
        .banner-img {
            position: absolute;
            right: -3px;
            bottom: -10px;
            width: 140px;
            opacity: 0.9;
        }

        /* 学习计划卡片 — 方案一：弥散背景 + 悬浮进度球 */
        .plan-card-v1 {
            margin: 20px 15px;
            padding: 24px;
            background: white;
            border-radius: 28px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        .plan-card-v1:active { opacity: 0.9; }

        /* 弥散背景装饰 */
        .plan-card-v1::before {
            content: "";
            position: absolute;
            top: -50px; right: -50px;
            width: 150px; height: 150px;
            background: radial-gradient(circle, rgba(30,60,114,0.1) 0%, transparent 70%);
            z-index: 0;
        }

        .v1-content {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .v1-info h4 {
            font-size: 20px;
            color: #1e3c72;
            margin-bottom: 6px;
        }

        .v1-info p {
            font-size: 13px;
            color: #64748B;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* 悬浮进度球 */
        .v1-progress-box {
            position: relative;
            width: 60px;
            height: 60px;
        }

        .v1-circle-svg {
            transform: rotate(-90deg);
            width: 60px;
            height: 60px;
        }

        .v1-circle-bg {
            fill: none;
            stroke: #F1F5F9;
            stroke-width: 5;
        }

        .v1-circle-fill {
            fill: none;
            stroke: #fbbf24;
            stroke-width: 5;
            stroke-linecap: round;
            stroke-dasharray: 100;
            stroke-dashoffset: 35; /* 65%进度 */
        }

        .v1-percent {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 14px;
            font-weight: 800;
            color: #f59e0b;
        }

        /* 底部信息栏 */
        .v1-footer {
            position: relative;
            z-index: 1;
            margin-top: 18px;
            padding-top: 15px;
            border-top: 1px solid #F1F5F9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .v1-next-tag {
            background: #EBF5FF;
            color: #1e3c72;
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 600;
        }

        .v1-action-text {
            color: #1e3c72;
            font-size: 13px;
            font-weight: 600;
        }

        /* 排行榜卡片 - 荣誉感升级 */
        .ranking-card {
            margin: 10px 15px;
            background: white;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
        }
        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .section-title h3 { font-size: 18px; color: #1a1a1a; display: flex; align-items: center; gap: 6px; }
        .more { font-size: 14px; color: #999; }

        .top-podium {
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            padding: 10px 0 20px;
        }
        .podium-item { text-align: center; position: relative; }
        
        .avatar-wrap {
            position: relative;
            margin-bottom: 8px;
        }
        .avatar-main {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            object-fit: cover;
        }
        .rank-1 .avatar-main { width: 70px; height: 70px; border-color: #FFD700; }
        .rank-2 .avatar-main { border-color: #C0C0C0; }
        .rank-3 .avatar-main { border-color: #CD7F32; }
        
        .crown { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); font-size: 20px; }
        .badge {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%) translateY(50%);
            background: #2a5298;
            color: white;
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 10px;
            font-weight: bold;
            white-space: nowrap;
        }

        .name { font-size: 15px; font-weight: 600; color: #333; margin-top: 12px; display: block; }
        .score { font-size: 13px; color: #2a5298; font-weight: 700; }

        /* 悬浮AI企鹅 - 磨砂专业感 */
        .ai-float {
            position: absolute;
            bottom: 100px;
            right: 15px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.5);
            padding: 10px 18px 10px 10px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 100;
            cursor: pointer;
        }
        .ai-icon-circle {
            width: 40px;
            height: 40px;
            background: #1e3c72;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .ai-text div:first-child { font-size: 14px; font-weight: 700; color: #1e3c72; }
        .ai-text div:last-child { font-size: 11px; color: #666; }

        /* 底部导航 - 5个tab */
        .tab-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 84px;
            background: white;
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }
        .tab-item { display: flex; flex-direction: column; align-items: center; gap: 3px; color: #999; cursor: pointer; min-width: 48px; }
        .tab-item.active { color: #1e3c72; }
        .tab-item svg { width: 22px; height: 22px; }
        .tab-item span { font-size: 10px; font-weight: 500; }
        
        .center-btn {
            position: relative;
            top: -22px;
        }
        .center-inner {
            width: 50px;
            height: 50px;
            background: #1e3c72;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            box-shadow: 0 8px 20px rgba(30,60,114,0.3);
            transform: rotate(45deg);
        }
        .center-inner svg { transform: rotate(-45deg); }

        .home-indicator {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 5px;
            background: #000;
            border-radius: 10px;
            opacity: 0.1;
        }

        /* 新手引导遮罩 */
        .guide-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            display: none;
        }

        .guide-overlay.active {
            display: block;
        }

        .guide-spotlight {
            position: absolute;
            border: 3px solid #FFD700;
            border-radius: 20px;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.85);
            transition: all 0.3s ease;
        }

        .guide-tip {
            position: absolute;
            background: white;
            padding: 20px;
            border-radius: 16px;
            max-width: 280px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .guide-tip h3 {
            font-size: 18px;
            color: #1e3c72;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .guide-tip p {
            font-size: 15px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .guide-buttons {
            display: flex;
            gap: 10px;
        }

        .guide-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .guide-btn-skip {
            background: #f0f0f0;
            color: #666;
        }

        .guide-btn-next {
            background: #1e3c72;
            color: white;
        }

        .guide-progress {
            text-align: center;
            margin-top: 10px;
            font-size: 13px;
            color: #999;
        }
    </style>
</head>
<body>

<!-- 新手引导遮罩 -->
<div class="guide-overlay" id="guideOverlay">
    <div class="guide-spotlight" id="guideSpotlight"></div>
    <div class="guide-tip" id="guideTip"></div>
</div>

<script>
    function updateTime() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        document.getElementById('time').textContent = h + ':' + m;
    }
    setInterval(updateTime, 1000);
    updateTime();

    // 新手引导功能
    const guideSteps = [
        {
            element: '.plan-card-v1',
            title: '学习计划',
            description: '点击进入你的专属学习路线，按阶段完成视频学习和考核'
        },
        {
            element: '.ranking-card',
            title: '积分排行榜',
            description: '查看积分排名，和其他阿姨一起比拼学习成果'
        }
    ];

    let currentStep = 0;
    const overlay = document.getElementById('guideOverlay');
    const spotlight = document.getElementById('guideSpotlight');
    const tip = document.getElementById('guideTip');

    function showGuide() {
        // 检查是否已经看过引导
        if (localStorage.getItem('guideCompleted')) {
            return;
        }

        overlay.classList.add('active');
        showStep(0);
    }

    function showStep(stepIndex) {
        if (stepIndex >= guideSteps.length) {
            endGuide();
            return;
        }

        currentStep = stepIndex;
        const step = guideSteps[stepIndex];
        const element = document.querySelector(step.element);
        
        if (!element) {
            endGuide();
            return;
        }

        const rect = element.getBoundingClientRect();
        
        // 设置聚光灯位置
        spotlight.style.left = (rect.left - 10) + 'px';
        spotlight.style.top = (rect.top - 10) + 'px';
        spotlight.style.width = (rect.width + 20) + 'px';
        spotlight.style.height = (rect.height + 20) + 'px';

        // 设置提示框位置和内容
        tip.innerHTML = `
            <h3>${step.title}</h3>
            <p>${step.description}</p>
            <div class="guide-buttons">
                <button class="guide-btn guide-btn-skip" onclick="skipGuide()">跳过</button>
                <button class="guide-btn guide-btn-next" onclick="nextStep()">${stepIndex === guideSteps.length - 1 ? '完成' : '下一步'}</button>
            </div>
            <div class="guide-progress">${stepIndex + 1} / ${guideSteps.length}</div>
        `;

        // 计算提示框位置（显示在元素下方）
        tip.style.left = '50%';
        tip.style.transform = 'translateX(-50%)';
        tip.style.top = (rect.bottom + 20) + 'px';
    }

    function nextStep() {
        showStep(currentStep + 1);
    }

    function skipGuide() {
        endGuide();
    }

    function endGuide() {
        overlay.classList.remove('active');
        localStorage.setItem('guideCompleted', 'true');
    }

    // 页面加载完成后延迟1秒显示引导
    window.addEventListener('load', function() {
        setTimeout(showGuide, 1000);
    });
</script>

</body>
</html>
