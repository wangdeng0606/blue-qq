<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蓝企鹅家政培训平台 - 专业版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #e8eaf0;
            font-family: -apple-system, "SF Pro Text", "PingFang SC", sans-serif;
        }

        /* 手机容器 */
        .phone-container {
            position: relative;
            width: 375px;
            height: 812px;
            background: #000;
            border-radius: 50px;
            padding: 12px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
        }

        .phone-frame {
            width: 100%;
            height: 100%;
            background: #F4F7FA;
            border-radius: 40px;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 160px;
            height: 30px;
            background: #000;
            border-radius: 0 0 18px 18px;
            z-index: 100;
        }

        /* 状态栏 */
        .status-bar {
            height: 44px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 24px 8px;
            font-size: 14px;
            font-weight: 600;
            z-index: 99;
        }

        /* 内容区 */
        .screen-content {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 100px;
        }

        .screen-content::-webkit-scrollbar { display: none; }

        /* 顶部标题栏 */
        .app-header {
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #F4F7FA;
        }
        .app-title { font-size: 18px; font-weight: 800; color: #1e3c72; letter-spacing: 0.5px; }

        /* 顶部Banner - 专业感升级 */
        .top-banner {
            margin: 10px 15px;
            height: 160px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            color: white;
            padding: 20px;
            box-shadow: 0 10px 20px rgba(30, 60, 114, 0.2);
        }

        .banner-content h2 { font-size: 20px; margin-bottom: 8px; font-weight: 600; }
        .banner-content p { font-size: 12px; opacity: 0.8; line-height: 1.5; }
        .banner-tag {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 4px 10px;
            border-radius: 10px;
            font-size: 10px;
            margin-bottom: 8px;
            backdrop-filter: blur(5px);
        }
        .banner-img {
            position: absolute;
            right: -10px;
            bottom: -10px;
            width: 140px;
            opacity: 0.9;
        }

        /* 金刚区 - 培训导向 */
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding: 20px 15px;
        }
        .grid-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .icon-box {
            width: 48px;
            height: 48px;
            background: white;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            color: #2a5298;
        }
        .grid-item span { font-size: 11px; color: #444; font-weight: 500; }

        /* 排行榜卡片 - 荣誉感升级 */
        .ranking-card {
            margin: 10px 15px;
            background: white;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
        }
        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .section-title h3 { font-size: 16px; color: #1a1a1a; display: flex; align-items: center; gap: 6px; }
        .more { font-size: 12px; color: #999; }

        .top-podium {
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            padding: 10px 0 20px;
        }
        .podium-item { text-align: center; position: relative; }
        
        .avatar-wrap {
            position: relative;
            margin-bottom: 8px;
        }
        .avatar-main {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            object-fit: cover;
        }
        .rank-1 .avatar-main { width: 70px; height: 70px; border-color: #FFD700; }
        .rank-2 .avatar-main { border-color: #C0C0C0; }
        .rank-3 .avatar-main { border-color: #CD7F32; }
        
        .crown { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); font-size: 20px; }
        .badge {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%) translateY(50%);
            background: #2a5298;
            color: white;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: bold;
        }

        .name { font-size: 13px; font-weight: 600; color: #333; margin-top: 12px; display: block; }
        .score { font-size: 11px; color: #2a5298; font-weight: 700; }

        /* 学习进度列表 */
        .study-list { margin: 0 15px; display: flex; flex-direction: column; gap: 12px; }
        .study-item {
            background: white;
            padding: 15px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .course-icon {
            width: 40px;
            height: 40px;
            background: #edf2f9;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2a5298;
        }
        .course-info { flex: 1; }
        .course-info h4 { font-size: 14px; margin-bottom: 4px; color: #333; }
        .progress-mini { height: 4px; background: #eee; border-radius: 2px; width: 80px; }
        .progress-inner { height: 100%; background: #2a5298; border-radius: 2px; }

        /* 悬浮AI企鹅 - 磨砂专业感 */
        .ai-float {
            position: absolute;
            bottom: 100px;
            right: 15px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.5);
            padding: 8px 15px 8px 8px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 100;
            cursor: pointer;
        }
        .ai-icon-circle {
            width: 36px;
            height: 36px;
            background: #1e3c72;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .ai-text div:first-child { font-size: 12px; font-weight: 700; color: #1e3c72; }
        .ai-text div:last-child { font-size: 9px; color: #666; }

        /* 底部导航 */
        .tab-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 84px;
            background: white;
            display: flex;
            justify-content: space-around;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }
        .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #999; }
        .tab-item.active { color: #1e3c72; }
        .tab-item svg { width: 22px; height: 22px; }
        .tab-item span { font-size: 10px; font-weight: 500; }
        
        .center-btn {
            position: relative;
            top: -25px;
        }
        .center-inner {
            width: 54px;
            height: 54px;
            background: #1e3c72;
            border-radius: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            box-shadow: 0 8px 20px rgba(30,60,114,0.3);
            transform: rotate(45deg);
        }
        .center-inner svg { transform: rotate(-45deg); }

        .home-indicator {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 5px;
            background: #000;
            border-radius: 10px;
            opacity: 0.1;
        }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="phone-frame">
        <div class="notch"></div>
        
        <div class="status-bar">
            <span id="time">09:41</span>
            <div style="display: flex; gap: 5px; align-items: center;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12.01 21.49L23.64 7c-.45-.34-4.93-4-11.64-4C5.28 3 .81 6.66.36 7l11.63 14.49.01.01.01-.01z" fill-opacity=".3"/></svg>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
            </div>
        </div>

        <div class="screen-content">
            <div class="app-header">
                <div class="app-title">蓝企鹅 · 专业培训</div>
                <div style="background: rgba(0,0,0,0.05); padding: 5px 12px; border-radius: 20px; display: flex; gap: 8px;">
                    <div style="width: 4px; height: 4px; background: #000; border-radius: 50%;"></div>
                    <div style="width: 4px; height: 4px; background: #000; border-radius: 50%;"></div>
                </div>
            </div>

            <div class="top-banner">
                <div class="banner-content">
                    <div class="banner-tag">精选课程库</div>
                    <h2>提升专业技能</h2>
                    <p>已有 1,284 位家政师<br>通过考核获得高级认证</p>
                </div>
                <div class="banner-img">
                    <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="100" cy="100" r="80" fill="white" fill-opacity="0.1"/>
                        <path d="M100 40C70 40 50 70 50 110C50 150 70 180 100 180C130 180 150 150 150 110C150 70 130 40 100 40Z" fill="white" fill-opacity="0.2"/>
                    </svg>
                </div>
            </div>

            <div class="nav-grid">
                <div class="grid-item">
                    <div class="icon-box">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.07" y2="19.07"/></svg>
                    </div>
                    <span>视频录制</span>
                </div>
                <div class="grid-item">
                    <div class="icon-box">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                    </div>
                    <span>学习广场</span>
                </div>
                <div class="grid-item">
                    <div class="icon-box">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                    </div>
                    <span>考核答题</span>
                </div>
                <div class="grid-item">
                    <div class="icon-box">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                    </div>
                    <span>积分商城</span>
                </div>
            </div>

            <div class="ranking-card">
                <div class="section-title">
                    <h3><span style="color:#FFD700">🏆</span> 优秀学员荣誉榜</h3>
                    <span class="more">本月更新 ></span>
                </div>
                <div class="top-podium">
                    <div class="podium-item rank-2">
                        <div class="avatar-wrap">
                            <img src="https://i.pravatar.cc/100?u=1" class="avatar-main">
                            <div class="badge">NO.2</div>
                        </div>
                        <span class="name">李秀兰</span>
                        <span class="score">98.5分</span>
                    </div>
                    <div class="podium-item rank-1">
                        <div class="avatar-wrap">
                            <div class="crown">👑</div>
                            <img src="https://i.pravatar.cc/100?u=2" class="avatar-main">
                            <div class="badge" style="background:#FFD700; color:#856404">TOP 1</div>
                        </div>
                        <span class="name">张美琴</span>
                        <span class="score">99.0分</span>
                    </div>
                    <div class="podium-item rank-3">
                        <div class="avatar-wrap">
                            <img src="https://i.pravatar.cc/100?u=3" class="avatar-main">
                            <div class="badge">NO.3</div>
                        </div>
                        <span class="name">王大姐</span>
                        <span class="score">97.2分</span>
                    </div>
                </div>
            </div>

            <div class="section-title" style="margin: 20px 20px 10px;">
                <h3>最近练题</h3>
            </div>
            <div class="study-list">
                <div class="study-item">
                    <div class="course-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    </div>
                    <div class="course-info">
                        <h4>厨房卫生清洁</h4>
                        <div style="display: flex; align-items:center; gap:10px;">
                            <div class="progress-mini"><div class="progress-inner" style="width: 75%"></div></div>
                            <span style="font-size: 10px; color:#999">已答 75%</span>
                        </div>
                    </div>
                </div>
                <div class="study-item">
                    <div class="course-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6l9 6 9-6-9-6-9 6zm0 6l9 6 9-6M3 18l9 6 9-6"/></svg>
                    </div>
                    <div class="course-info">
                        <h4>厕所卫生清洁</h4>
                        <div style="display: flex; align-items:center; gap:10px;">
                            <div class="progress-mini"><div class="progress-inner" style="width: 30%"></div></div>
                            <span style="font-size: 10px; color:#999">已答 30%</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="ai-float">
            <div class="ai-icon-circle">
                <img src="ai企鹅悬浮头像.png" style="width:100%; height:100%; object-fit:cover; border-radius:50%;">
            </div>
            <div class="ai-text">
                <div>蓝企鹅助教</div>
                <div>有问题问我</div>
            </div>
        </div>

        <div class="tab-bar">
            <div class="tab-item active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                <span>首页</span>
            </div>
            <div class="tab-item center-btn">
                <div class="center-inner">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </div>
            </div>
            <div class="tab-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span>我的</span>
            </div>
        </div>

        <div class="home-indicator"></div>
    </div>
</div>

<script>
    function updateTime() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        document.getElementById('time').textContent = h + ':' + m;
    }
    setInterval(updateTime, 1000);
    updateTime();
</script>

</body>
</html>
